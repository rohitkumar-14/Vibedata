services:
  # FastAPI Backend Web Service
  - type: web
    name: vibedata-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false # Set your Gemini API key in Render Dashboard

  # React Frontend Static Site
  - type: static
    name: vibedata-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://vibedata-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
